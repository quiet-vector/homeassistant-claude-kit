- id: jarvis_mode_morning_weekdays
  alias: JARVIS Mode — Morning
  description: ''
  triggers:
  - at: 05:00:00
    trigger: time
  conditions:
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    - sun
    - sat
  - condition: template
    value_template: '{{ states(''input_select.jarvis_mode'') != ''vacation'' }}'
  actions:
  - target:
      entity_id: input_select.jarvis_mode
    data:
      option: morning
    action: input_select.select_option
  mode: single
