- id: '1771293654987'
  alias: JARVIS Mode
  description: ''
  triggers:
  - trigger: mqtt
    topic: jarvis/cmd/mode/set
  conditions: []
  actions:
  - action: input_select.set_options
    metadata: {}
    target:
      entity_id: input_select.jarvis_mode
    data:
      options:
      - '{{ trigger.payload }}'
  mode: single
- id: '1771293906550'
  alias: publish mode state
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_select.jarvis_mode
  conditions: []
  actions:
  - action: mqtt.publish
    metadata: {}
    data:
      evaluate_payload: false
      qos: 0
      retain: false
      topic: jarvis/state/mode
      payload: '{{ states(''input_select.jarvis_mode'') }}

        '
  mode: single
- id: '1771379613639'
  alias: JARVIS – Enter Night Mode
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_select.jarvis_mode
    to:
    - night
  conditions: []
  actions:
  - action: input_boolean.turn_on
    metadata: {}
    target:
      entity_id:
      - input_boolean.jarvis_night_armed
      - input_boolean.quiet_hours
    data: {}
  - action: mqtt.publish
    metadata: {}
    data:
      evaluate_payload: false
      qos: 0
      retain: false
      topic: jarvis/state/night
      payload: armed
  - action: notify.notify
    metadata: {}
    data:
      message: 'JARVIS: Night mode armed.'
  mode: single
- id: '1771594722648'
  alias: JARVIS - Exit night Mode
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_select.jarvis_mode
    from:
    - night
  conditions: []
  actions:
  - action: input_boolean.turn_off
    metadata: {}
    target:
      entity_id:
      - input_boolean.jarvis_night_armed
      - input_boolean.quiet_hours
    data: {}
  - action: mqtt.publish
    metadata: {}
    data:
      evaluate_payload: false
      qos: 0
      retain: false
      topic: jarvis/state/night
      payload: disarmed
  mode: single
- id: '1771726450227'
  alias: Set Amber When Empty
  description: ''
  triggers:
  - trigger: state
    entity_id:
