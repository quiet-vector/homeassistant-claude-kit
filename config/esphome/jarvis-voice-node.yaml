esphome:
  name: jarvis-voice-node
  friendly_name: JARVIS Voice Node
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 100%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  variant: ESP32S3

psram:
  mode: octal

media_player:
  - platform: speaker
    id: mp_earcon
    name: "Jarvis Earcons"
    announcement_pipeline:
      speaker: cores3_speaker
      format: WAV
      sample_rate: 22050
      num_channels: 1
    buffer_size: 40000
    codec_support_enabled: false
    task_stack_in_psram: true

logger: 

api:

ota:
  - platform: esphome
    password: "be34970cc370fa27e1b192abd3244d05"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Jarvis-Voice-Node"
    password: "HGbo1PC9cbEi"

captive_portal:

external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [ axp2101, aw88298, aw9523b ]

i2c:
  - id: bus_internal
    sda: GPIO12
    scl: GPIO11
    scan: true

spi:
  - id: spi_bus
    clk_pin: GPIO36
    mosi_pin: GPIO37

axp2101:
  id: axp2101_pmu
  i2c_id: bus_internal

aw9523b:
  - id: aw9523b_hub
    i2c_id: bus_internal

# Backlight rail
output:
  - platform: axp2101
    type: range
    axp2101_id: axp2101_pmu
    channel: DLDO1
    id: lcd_backlight_output
    min_voltage: 2600
  
light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    output: lcd_backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

# CoreS3 LCD
display:
  - platform: mipi_spi
    model: M5CORE
    id: m5cores3_lcd
    spi_id: spi_bus
    cs_pin:
      number: GPIO3
      ignore_strapping_warning: true
    dc_pin: GPIO35
    reset_pin:
      aw9523b: aw9523b_hub
      number: 9
    data_rate: 40MHz
    invert_colors: true
    show_test_card: false

# Touchscreen (CoreS3 FT63X6)
touchscreen:
  - platform: ft63x6
    id: core_touch
    i2c_id: bus_internal
    address: 0x38

    # IMPORTANT: poll instead of interrupt (fixes “no touch logs”)
    update_interval: 50ms

    # Bind to display for correct LVGL coordinate mapping
    display: m5cores3_lcd

    reset_pin:
      aw9523b: aw9523b_hub
      number: 0

    calibration:
      x_min: 0
      x_max: 320
      y_min: 0
      y_max: 240

    on_touch:
      then:
        - lambda: |-
            ESP_LOGI("touch", "TOUCH x=%d y=%d", (int)touch.x, (int)touch.y);

sensor:
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    update_interval: 5s

globals:
  - id: va_running
    type: bool
    restore_value: no
    initial_value: "false"

interval:
  - interval: 2s
    then:
      - if:
          condition:
            lambda: 'return id(wifi_rssi).has_state();'
          then:
            - lvgl.label.update:
                id: lbl_wifi
                text: !lambda |-
                  char buf[32];
                  snprintf(buf, sizeof(buf), "WiFi: OK (%.0f dBm)", id(wifi_rssi).state);
                  return std::string(buf);
          else:
            - lvgl.label.update:
                id: lbl_wifi
                text: "WiFi: DOWN"

      - if:
          condition:
            lambda: 'return id(va_running);'
          then:
            - lvgl.label.update:
                id: lbl_va
                text: "Voice: LISTENING"
          else:
            - lvgl.label.update:
                id: lbl_va
                text: "Voice: IDLE"

# Audio bus (CoreS3)
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO34
    i2s_mclk_pin:
      number: GPIO0
      ignore_strapping_warning: true

microphone:
  - platform: i2s_audio
    id: cores3_mic
    i2s_din_pin: GPIO14
    adc_type: external
    channel: left
    bits_per_sample: 16bit
    sample_rate: 16000

speaker:
  - platform: i2s_audio
    id: cores3_speaker
    i2s_dout_pin: GPIO13
    dac_type: external
    bits_per_sample: 16bit
    sample_rate: 22050
    buffer_duration: 300ms
      
voice_assistant:
  id: va
  microphone: cores3_mic
  speaker: cores3_speaker
  use_wake_word: false

  on_start:
    then:
      - lambda: 'id(va_running) = true;'

  on_end:
    then:
      - lambda: 'id(va_running) = false;'
      - media_player.play_media:
          id: mp_earcon
          media_url: "http://192.168.60.50:8123/local/beep_start.wav"

  on_error:
    then:
      - lambda: 'id(va_running) = false;'
      - media_player.play_media:
          id: mp_earcon
          media_url: "http://192.168.60.50:8123/local/beep_start.wav"

lvgl:
  displays:
    - m5cores3_lcd
  touchscreens:
    - core_touch

  pages:
    - id: main_page
      widgets:
        - label:
            id: lbl_title
            text: "JARVIS Voice Node"
            x: 10
            y: 10

        - label:
            id: lbl_wifi
            text: "WiFi: ..."
            x: 10
            y: 45

        - label:
            id: lbl_va
            text: "Voice: IDLE"
            x: 10
            y: 75

        # Use shorthand text: for reliability (LVGL docs support this)
        - button:
            id: btn_talk
            x: 10
            y: 120
            width: 140
            height: 60
            text: "TALK"
            on_click:
              then:
                - media_player.play_media:
                    id: mp_earcon
                    media_url: "http://192.168.60.50:8123/local/beep_start.wav"
                - delay: 200ms
                - voice_assistant.start:
                     id: va

        - button:
            id: btn_stop
            x: 170
            y: 120
            width: 140
            height: 60
            text: "STOP"
            on_click:
              then:
                - voice_assistant.stop:
                    id: va

        - button:
            id: btn_backlight
            x: 10
            y: 185
            width: 300
            height: 40
            text: "Backlight (hold)"
            on_long_press:
              then:
                - light.toggle: lcd_backlight            

            